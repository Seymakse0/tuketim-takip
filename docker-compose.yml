services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tuketim
      POSTGRES_PASSWORD: tuketim
      POSTGRES_DB: tuketim_kontrol
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://tuketim:tuketim@db:5432/tuketim_kontrol?schema=public
      APP_TIMEZONE: Europe/Istanbul
    depends_on:
      - db

volumes:
  pgdata:
