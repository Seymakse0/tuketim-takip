services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tuketim
      POSTGRES_PASSWORD: tuketim
      POSTGRES_DB: tuketim_kontrol
    # Host portu: paylaşımlı sunucuda 5433 doluysa 5434 kullanılır (app içi bağlantı yine db:5432).
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    # Yerel: http://localhost:3000 — üretim sunucusunda docker-compose.production.yml (127.0.0.1:3005) kullanın.
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: tuketim
      POSTGRES_PASSWORD: tuketim
      POSTGRES_DB: tuketim_kontrol
      APP_TIMEZONE: Europe/Istanbul
      APP_AUTH_SECRET: ${APP_AUTH_SECRET:-tuketim_dev_change_me_minimum_thirty_two_chars_long}
      APP_AUTH_USERS: ${APP_AUTH_USERS:-mutfak:mutfak123}
      APP_AUTH_USERS_JSON: ${APP_AUTH_USERS_JSON:-}
    depends_on:
      - db

volumes:
  pgdata:
