# Not: Bu repo (tüketim kontrol) canlıda kitchen.voyagestars.com ile eşlenir.
# Bu dosya yalnızca başka bir uygulama için aynı Nginx kalıbını kopyalamak içindir.
# follow.voyagestars.com ayrı projedir; proxy_pass hedef portu o uygulamaya göre ayarlayın.

server {
    listen 80;
    listen [::]:80;
    server_name follow.voyagestars.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name follow.voyagestars.com;

    ssl_certificate     /etc/letsencrypt/live/follow.voyagestars.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/follow.voyagestars.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:PORT;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
