# Örnek: sunucudaki ana Nginx’e site eklemek için.
# follow.voyagestars.com → bu projenin Docker konteyneri (127.0.0.1:3005)
#
# 1) DNS: follow.voyagestars.com A kaydı → 194.62.54.157
# 2) certbot: sudo certbot certonly --nginx -d follow.voyagestars.com
#    (veya mevcut wildcard *.voyagestars.com sertifikanız varsa ssl_certificate yollarını ona göre verin)
# 3) Bu dosyayı /etc/nginx/sites-available/ altına kopyalayıp sites-enabled’a symlink; nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name follow.voyagestars.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name follow.voyagestars.com;

    # Let's Encrypt örnek yolları (certbot ile oluşana göre düzenleyin)
    ssl_certificate     /etc/letsencrypt/live/follow.voyagestars.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/follow.voyagestars.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
