# Örnek: sunucudaki ana Nginx’e site eklemek için.
# kitchen.voyagestars.com → bu projenin Docker konteyneri (127.0.0.1:3005)
#
# 1) DNS: kitchen.voyagestars.com A kaydı → sunucu IP’niz
# 2) certbot: sudo certbot certonly --nginx -d kitchen.voyagestars.com
#    (veya *.voyagestars.com wildcard sertifikanız varsa ssl_certificate yollarını ona göre verin)
# 3) Kopya: sudo cp nginx-kitchen.voyagestars.com.example.conf /etc/nginx/sites-available/kitchen.voyagestars.com
#    sudo ln -sf /etc/nginx/sites-available/kitchen.voyagestars.com /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
# --- kitchen ile gate aynı siteyi görüyorsa (sık görülen) ---
# - Bu blokta server_name tam olarak "kitchen.voyagestars.com" olmalı; gate başka dosyada başka porta gitmeli.
# - kitchen için site-enabled’da ayrı bir dosya yoksa istekler default_server (çoğunlukla gate) bloğuna düşer.
# - Cloudflare → Rules: kitchen’i gate’e yönlendiren Redirect kuralı varsa kaldırın.
# - Doğrulama (sunucuda): curl -sI -H "Host: kitchen.voyagestars.com" http://127.0.0.1
#   Location / sunucunuzun yönlendirmesini gösterir; uygulama: curl -sI http://127.0.0.1:3005

server {
    listen 80;
    listen [::]:80;
    server_name kitchen.voyagestars.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kitchen.voyagestars.com;

    # Let's Encrypt örnek yolları (certbot ile oluşana göre düzenleyin)
    ssl_certificate     /etc/letsencrypt/live/kitchen.voyagestars.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kitchen.voyagestars.com/privkey.pem;

    # Upstream tek port — Nginx örnek conf ile docker-compose.production.yml (127.0.0.1:3005:3000) eşleşmeli
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        # 502: app konteyneri kapalı / yanlış port → sunucuda: ./deploy/fix-502.sh
    }
}
